			shellScript = "SERVICE_INFO_PLIST=\"${PROJECT_DIR}/AIscend/Resources/Configuration/GoogleService-Info.plist\"\nAPP_INFO_PLIST=\"${TARGET_BUILD_DIR}/${INFOPLIST_PATH}\"\n\nif [ ! -f \"${SERVICE_INFO_PLIST}\" ]; then\n  echo \"GoogleService-Info.plist not found; skipping Google URL scheme injection.\"\n  exit 0\nfi\n\nREVERSED_CLIENT_ID=$(/usr/libexec/PlistBuddy -c \"Print :REVERSED_CLIENT_ID\" \"${SERVICE_INFO_PLIST}\" 2>/dev/null)\n\nif [ -z \"${REVERSED_CLIENT_ID}\" ]; then\n  echo \"REVERSED_CLIENT_ID missing; skipping Google URL scheme injection.\"\n  exit 0\nfi\n\nif /usr/libexec/PlistBuddy -c \"Print :CFBundleURLTypes\" \"${APP_INFO_PLIST}\" >/dev/null 2>&1; then\n  if /usr/libexec/PlistBuddy -c \"Print :CFBundleURLTypes\" \"${APP_INFO_PLIST}\" | grep -Fq \"${REVERSED_CLIENT_ID}\"; then\n    exit 0\n  fi\nelse\n  /usr/libexec/PlistBuddy -c \"Add :CFBundleURLTypes array\" \"${APP_INFO_PLIST}\"\nfi\n\nINDEX=$(/usr/libexec/PlistBuddy -c \"Print :CFBundleURLTypes\" \"${APP_INFO_PLIST}\" 2>/dev/null | grep -c \"Dict {\")\n/usr/libexec/PlistBuddy -c \"Add :CFBundleURLTypes:${INDEX} dict\" \"${APP_INFO_PLIST}\"\n/usr/libexec/PlistBuddy -c \"Add :CFBundleURLTypes:${INDEX}:CFBundleTypeRole string Editor\" \"${APP_INFO_PLIST}\"\n/usr/libexec/PlistBuddy -c \"Add :CFBundleURLTypes:${INDEX}:CFBundleURLSchemes array\" \"${APP_INFO_PLIST}\"\n/usr/libexec/PlistBuddy -c \"Add :CFBundleURLTypes:${INDEX}:CFBundleURLSchemes:0 string ${REVERSED_CLIENT_ID}\" \"${APP_INFO_PLIST}\"\n";
